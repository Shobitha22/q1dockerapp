apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-q1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-q1
  template:
    metadata:
      labels:
        app: devops-q1
    spec:
      containers:
      - name: devops-q1
        image: yourdockerhub/devops-q1:latest
        ports:
        - containerPort: 80